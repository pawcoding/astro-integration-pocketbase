name: 🧪 Test code
# Run this on every push except master and next
on:
  push:
    branches-ignore:
      - master
      - next

env:
  HUSKY: 0

jobs:
  test:
    # Use the latest version of Ubuntu
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      # Checkout repository
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Setup Node
      - name: 📦 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      # Enable corepack
      - name: ⚙️ Enable corepack
        run: corepack enable && corepack enable npm

      # Install dependencies
      - name: 📦 Install dependencies
        run: npm ci

      # Lint code
      - name: 🧹 Lint code (includes type-check)
        run: npm run lint

      # Check format
      - name: 🧹 Check format
        run: npm run format:check

      # Type check
      #   Still included for now, since the oxlint built-in typecheck uses TypeScript v7.
      #   This one uses the TypeScript version actually specified in the project.
      - name: 🧪 Type check
        run: npx tsc --noEmit

      # Build
      - name: 🏗️ Build code
        run: npm run build
